<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolatore Costo Viaggio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            width: 350px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 4px;
            color: #333;
            font-weight: bold;
            text-align: center;
            border-left: 5px solid #28a745;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Calcolatore Viaggio</h2>
        
        <!-- Distanza e Consumo -->
        <div class="input-group">
            <label for="distanza">Distanza (km)</label>
            <input type="number" id="distanza" step="10" placeholder="Es. 500">
        </div>

        <div class="input-group">
            <label for="consumo">Consumo (L/100km)</label>
            <input type="number" id="consumo" step=".1" placeholder="Es. 7.5">
        </div>

        <div class="input-group">
            <label for="prezzo">Prezzo Carburante (€/Litro)</label>
            <input type="number" id="prezzo" step=".01" placeholder="Es. 1.65">
        </div>

        <!-- Costo Aggiuntivo (Autostrada, ecc.) -->
        <div class="input-group">
            <label for="aggiuntivo">Costo Aggiuntivo (Toll/Pedaggi/€)</label>
            <input type="number" id="aggiuntivo" placeholder="Es. 25.00 o 0">
        </div>

        <button onclick="calcolaCosto()">Calcola Totale</button>

        <div id="risultato" class="result-box">
            Risultato...
        </div>
    </div>

    <script>
        function calcolaCosto() {
            // Prendiamo i valori dagli input
            let distanza = parseFloat(document.getElementById("distanza").value);
            let consumo = parseFloat(document.getElementById("consumo").value);
            let prezzo = parseFloat(document.getElementById("prezzo").value);
            let aggiunto = parseFloat(document.getElementById("aggiuntivo").value);

            // Controllo per evitare errori matematici (es. dividere per zero o dati nulli)
            if (isNaN(distanza) || isNaN(consumo) || isNaN(prezzo)) {
                document.getElementById("risultato").innerHTML = "Per favore, inserisci i valori numerici correttamente.";
                return;
            }

            // 1. Calcolo Carburante
            // (Consumo / 100) * Distanza = Litri totali
            let litriTotali = (consumo / 100) * distanza;

            // Calcolo Costo Carburante
            let costoCarburante = litriTotali * prezzo;

            // 2. Gestione Costo Aggiuntivo
            // Se il campo è vuoto o non è un numero valido, lo trattiamo come 0
            let costoTotale = costoCarburante;
            if (!isNaN(aggiunto) && aggiunto >= 0) {
                costoTotale = costoCarburante + aggiunto;
            } else {
                costoTotale = costoCarburante;
            }

            // Visualizza il risultato
            // Arrotondo a 2 decimali per il prezzo
            document.getElementById("risultato").innerHTML = 
                `Costo Carburante: <br> ${costoCarburante.toFixed(2)} €<br>
                 Costo Aggiuntivo: <br> ${costoTotale.toFixed(2)} € (Incluso)`;
        }
    </script>

</body>
</html>
