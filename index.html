<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolatore Costo Viaggio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 300px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box; /* Assicura che il padding non aumenti la larghezza */
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            background-color: #218838;
        }
        .result-box {
            margin-top: 20px;
            padding: 10px;
            background-color: #e9ecef;
            border-radius: 4px;
            color: #333;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Costo Viaggio</h2>
        
        <div class="input-group">
            <label for="distanza">Distanza (km)</label>
            <input type="number" id="distanza" step="10" placeholder="Es. 500">
        </div>

        <div class="input-group">
            <label for="consumo">Consumo (L/100km)</label>
            <input type="number" id="consumo" step=".1" placeholder="Es. 7.5">
        </div>

        <div class="input-group">
            <label for="prezzo">Prezzo Carburante (€/Litro)</label>
            <input type="number" id="prezzo" step=".01" placeholder="Es. 1.80">
        </div>

        <button onclick="calcolaCosto()">Calcola Costo</button>

        <div class="result-box" id="risultato"></div>
    </div>

    <script>
        function calcolaCosto() {
            // Prendiamo i valori dai campi input
            var distanza = parseFloat(document.getElementById('distanza').value);
            var consumo = parseFloat(document.getElementById('consumo').value);
            var prezzo = parseFloat(document.getElementById('prezzo').value);

            // Controllo se i campi sono vuoti
            if (isNaN(distanza) || isNaN(consumo) || isNaN(prezzo) || consumo === 0) {
                document.getElementById("risultato").innerHTML = "Per favore, inserisci tutti i valori corretti (consumo &gt; 0).";
                return;
            }

            // FORMULA CORRETTA:
            // (Consumo / 100) * Distanza = Litri totali
            // Esempio: Consumo 7.5, Distanza 100 -> (7.5/100)*100 = 7.5 litri.
            var litriTotali = (consumo / 100) * distanza;

            // Calcolo il costo totale
            var costoTotale = litriTotali * prezzo;

            // Visualizza il risultato
            // Arrotondo a 2 decimali per il prezzo
            document.getElementById("risultato").innerHTML = 
                "Costo totale: <br>" + costoTotale.toFixed(2) + " €";
        }
    </script>

</body>
</html>
